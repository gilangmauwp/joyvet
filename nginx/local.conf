# ──────────────────────────────────────────────────────────────
# JoyVet Care — Nginx configuration for LAN deployment
# Server: 192.168.1.100 / joyvet.local
# Self-signed TLS for HTTPS-only operation (required for PWA/camera)
# ──────────────────────────────────────────────────────────────

upstream joyvet_app {
    server app:8000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name 192.168.1.100 joyvet.local;
    return 301 https://$host$request_uri;
}

# HTTPS + WebSocket
server {
    listen 443 ssl;
    server_name 192.168.1.100 joyvet.local;

    # Self-signed certificate (generated by setup script)
    ssl_certificate     /etc/nginx/certs/joyvet.crt;
    ssl_certificate_key /etc/nginx/certs/joyvet.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Allow large file uploads (clinical photos, lab results)
    client_max_body_size 100M;
    client_body_timeout  120s;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1000;

    # ── Static files — served directly by Nginx (fast, no Python) ──
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # Service Worker — must be served from root, no-cache
    location /static/sw.js {
        alias /var/www/static/sw.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # ── Media files — authenticated via Django ─────────────────────
    location /media/ {
        alias /var/www/media/;
        # Internal auth check: Django returns 200 if user is authenticated
        auth_request /api/v1/media-auth/;
        auth_request_set $auth_status $upstream_status;
        # Serve directly if auth passes
        expires 1d;
    }

    # ── WebSocket upgrade ──────────────────────────────────────────
    location /ws/ {
        proxy_pass http://joyvet_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;  # Keep WS connections alive all day
        proxy_send_timeout 86400s;
    }

    # ── Django application ─────────────────────────────────────────
    location / {
        proxy_pass http://joyvet_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 30s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        # HTMX partial requests should not be cached by browser
        add_header Vary HX-Request;
    }
}
