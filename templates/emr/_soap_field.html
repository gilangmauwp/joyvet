<div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-5">
  <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">
    {{ label }}
  </label>
  <p class="text-xs text-slate-400 mb-3">{{ help }}</p>
  <textarea
    name="{{ field }}"
    id="id_{{ field }}"
    rows="6"
    class="w-full text-sm bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3.5 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary-500 resize-none"
    placeholder="Enter {{ label|lower }} notes…"
  >{{ value }}</textarea>
</div>
