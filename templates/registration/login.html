<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — JoyVet Care</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>body{font-family:'DM Sans',sans-serif;}</style>
</head>
<body class="h-full flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-teal-500 rounded-2xl mb-4">
        <span class="text-white text-2xl font-bold">JV</span>
      </div>
      <h1 class="text-2xl font-bold text-slate-900">JoyVet Care</h1>
      <p class="text-slate-500 text-sm mt-1">Clinic Management System</p>
    </div>

    <!-- Login card -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <h2 class="text-lg font-semibold text-slate-900 mb-6">Sign in to your account</h2>

      {% if form.errors %}
      <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700">
        Invalid username or password. Please try again.
      </div>
      {% endif %}

      <form method="post" action="{% url 'login' %}" class="space-y-4">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}" />

        <div>
          <label for="id_username" class="block text-sm font-medium text-slate-700 mb-1.5">Username</label>
          <input
            type="text"
            id="id_username"
            name="username"
            autocomplete="username"
            autofocus
            required
            class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500"
            placeholder="Enter your username"
          />
        </div>

        <div>
          <label for="id_password" class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
          <input
            type="password"
            id="id_password"
            name="password"
            autocomplete="current-password"
            required
            class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500"
            placeholder="••••••••"
          />
        </div>

        <button
          type="submit"
          class="w-full py-2.5 bg-teal-500 hover:bg-teal-600 text-white font-semibold rounded-xl text-sm transition-colors"
        >
          Sign In
        </button>
      </form>

      <p class="text-xs text-slate-400 text-center mt-6">
        JoyVet Care — Internal clinic system only.<br/>
        Contact your administrator to reset your password.
      </p>
    </div>

    <!-- Offline notice -->
    <p class="text-center text-xs text-slate-400 mt-6">
      🔒 Runs locally — no internet required
    </p>
  </div>
</body>
</html>
