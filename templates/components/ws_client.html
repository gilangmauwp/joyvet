<!--
  WebSocket connection indicator + event handler.
  Rendered once in the top bar. Handles all real-time events for this branch.
-->
<div x-data="wsClient()" x-init="connect()">
  <!-- Connection indicator dot -->
  <div class="flex items-center gap-1.5 text-xs">
    <div
      :class="connected ? 'bg-green-400' : 'bg-red-400'"
      class="w-2 h-2 rounded-full"
      :class="connected ? 'animate-pulse' : ''"
    ></div>
    <span
      x-text="connected ? 'Live' : 'Offline'"
      :class="connected ? 'text-green-600 dark:text-green-400' : 'text-red-500'"
      class="hidden sm:inline"
    ></span>
  </div>
</div>

<script>
function wsClient() {
  return {
    ws: null,
    connected: false,
    retries: 0,
    reconnectTimer: null,

    connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      this.ws = new WebSocket(`${proto}://${location.host}/ws/clinic/`);

      this.ws.onopen = () => {
        this.connected = true;
        this.retries = 0;
        clearTimeout(this.reconnectTimer);
      };

      this.ws.onclose = () => {
        this.connected = false;
        // Exponential backoff: 1s, 2s, 4s, 8s … capped at 30s
        const delay = Math.min(1000 * Math.pow(2, this.retries++), 30000);
        this.reconnectTimer = setTimeout(() => this.connect(), delay);
      };

      this.ws.onmessage = (evt) => {
        try {
          const data = JSON.parse(evt.data);
          this.handleEvent(data);
        } catch (e) { /* ignore malformed */ }
      };
    },

    handleEvent(data) {
      switch (data.type) {

        case 'appointment.status_changed':
          // Refresh just the affected appointment card
          htmx.ajax('GET', `/appointments/${data.appointment_id}/card/`,
            { target: `#appt-card-${data.appointment_id}`, swap: 'outerHTML' });
          showToast(`${data.patient_name} → ${data.new_status}`, 'info');
          break;

        case 'inventory.low_stock':
          showToast(`⚠ Low stock: ${data.item_name} (${data.current_qty} ${data.unit || ''} left)`, 'warning');
          // Increment nav badge
          const badge = document.querySelector('#stock-alert-badge');
          if (badge) badge.textContent = parseInt(badge.textContent || '0') + 1;
          break;

        case 'inventory.expiry_alert':
          if (data.severity === 'critical')
            showToast(`🗓 EXPIRING: ${data.item_name} in ${data.days_remaining} days!`, 'error');
          break;

        case 'invoice.paid':
          showToast(`✅ Payment: ${data.invoice_number} — Rp ${parseInt(data.amount).toLocaleString('id-ID')}`, 'success');
          // Refresh revenue widget
          htmx.ajax('GET', '/dashboard/revenue-widget/', { target: '#revenue-widget', swap: 'innerHTML' });
          break;

        case 'consultation.new_attachment':
          // Refresh attachment list if currently viewing that consultation
          const attachList = document.querySelector('#attachments-list');
          if (attachList) {
            htmx.ajax('GET',
              `/emr/consultations/${data.consultation_id}/`,
              { target: '#attachments-list', swap: 'innerHTML' });
          }
          showToast(`📷 New file: ${data.filename} by ${data.uploaded_by}`, 'info');
          break;
      }
    },
  };
}
</script>
